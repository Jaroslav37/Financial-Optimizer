<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <title>Финансовый дашборд</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --primary: #4285f4;
      --success: #34a853;
      --danger: #ea4335;
      --warning: #fbbc04;
      --bg: #f8f9fa;
      --card: #ffffff;
      --text: #202124;
      --text-secondary: #5f6368;
      --radius: 12px;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f2f5;
      padding: 16px;
      color: var(--text);
    }
    .dashboard {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    /* Header */
    .header {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px 24px;
      box-shadow: var(--shadow);
    }
    .header h1 { font-size: 24px; font-weight: 600; }
    .header .subtitle { color: var(--text-secondary); margin-top: 4px; }
    
    /* Metric cards */
    .metrics-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .metric-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .metric-card .icon { font-size: 28px; margin-bottom: 8px; }
    .metric-card .label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .metric-card .value { font-size: 24px; font-weight: 700; }
    .metric-card .value.positive { color: var(--success); }
    .metric-card .value.negative { color: var(--danger); }
    .metric-card .value.warning { color: var(--warning); }
    
    /* Charts row */
    .charts-row {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 12px;
    }
    .chart-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
    }
    .chart-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--text); }
    .chart-card canvas { max-height: 280px; }
    
    /* Budget row */
    .budget-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
    }
    .budget-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 16px; }
    .budget-item {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .budget-item .name {
      width: 120px;
      font-size: 13px;
      font-weight: 500;
    }
    .budget-item .bar-container {
      flex: 1;
      height: 20px;
      background: #f1f3f4;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }
    .budget-item .bar {
      height: 100%;
      border-radius: 10px;
      transition: width 0.3s ease;
    }
    .budget-item .bar.safe { background: var(--success); }
    .budget-item .bar.warning { background: var(--warning); }
    .budget-item .bar.danger { background: var(--danger); }
    .budget-item .percent {
      width: 50px;
      font-size: 12px;
      font-weight: 600;
      text-align: right;
    }
    
    /* Recommendations */
    .recommendations-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
    }
    .recommendations-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
    .recommendation {
      padding: 10px 14px;
      margin-bottom: 8px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.4;
    }
    .recommendation.high { background: #fce8e6; border-left: 4px solid var(--danger); }
    .recommendation.medium { background: #fef7e0; border-left: 4px solid var(--warning); }
    .recommendation.low { background: #e6f4ea; border-left: 4px solid var(--success); }
    
    @media (max-width: 768px) {
      .metrics-row { grid-template-columns: repeat(2, 1fr); }
      .charts-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="dashboard">
  <div class="header">
    <h1>📊 Финансовый дашборд</h1>
    <div class="subtitle" id="headerSubtitle">Загрузка...</div>
  </div>

  <div class="metrics-row">
    <div class="metric-card">
      <div class="icon">💵</div>
      <div class="label">Доходы</div>
      <div class="value" id="metricIncome">—</div>
    </div>
    <div class="metric-card">
      <div class="icon">💸</div>
      <div class="label">Расходы</div>
      <div class="value" id="metricExpense">—</div>
    </div>
    <div class="metric-card">
      <div class="icon">💰</div>
      <div class="label">Прибыль</div>
      <div class="value" id="metricProfit">—</div>
    </div>
    <div class="metric-card">
      <div class="icon">📈</div>
      <div class="label">Норма сбережений</div>
      <div class="value" id="metricSavings">—</div>
    </div>
  </div>

  <div class="charts-row">
    <div class="chart-card">
      <h3>📈 Доходы и расходы по месяцам</h3>
      <canvas id="monthlyChart"></canvas>
    </div>
    <div class="chart-card">
      <h3>🍰 Структура расходов</h3>
      <canvas id="pieChart"></canvas>
    </div>
  </div>

  <div class="budget-card" id="budgetSection">
    <h3>📊 Исполнение бюджета</h3>
    <div id="budgetItems"></div>
  </div>

  <div class="recommendations-card" id="recommendationsSection">
    <h3>💡 Рекомендации</h3>
    <div id="recommendationsList"></div>
  </div>
</div>

<script>
  // Получаем данные из серверного шаблона
  const DATA = JSON.parse('<?= dashboardData ?>');
  
  // Инициализация
  function init() {
    document.getElementById('headerSubtitle').textContent = 
      `${DATA.year} год • Данные на ${DATA.currentMonth}`;
    
    updateMetrics();
    drawMonthlyChart();
    drawPieChart();
    renderBudget();
    renderRecommendations();
  }

  function updateMetrics() {
    document.getElementById('metricIncome').textContent = formatMoney(DATA.totalIncome);
    document.getElementById('metricExpense').textContent = formatMoney(DATA.totalExpenses);
    
    const profitEl = document.getElementById('metricProfit');
    profitEl.textContent = formatMoney(DATA.profit);
    profitEl.className = 'value ' + (DATA.profit >= 0 ? 'positive' : 'negative');
    
    const savingsEl = document.getElementById('metricSavings');
    savingsEl.textContent = DATA.savingsRate.toFixed(1) + '%';
    savingsEl.className = 'value ' + (DATA.savingsRate >= 20 ? 'positive' : (DATA.savingsRate >= 10 ? 'warning' : 'negative'));
  }

  function drawMonthlyChart() {
    const ctx = document.getElementById('monthlyChart').getContext('2d');
    const months = DATA.monthlyData.map(d => d.month.substring(0, 3));
    
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: months,
        datasets: [
          {
            label: 'Доходы',
            data: DATA.monthlyData.map(d => d.income),
            backgroundColor: '#34a853',
            borderRadius: 4
          },
          {
            label: 'Расходы',
            data: DATA.monthlyData.map(d => d.expenses),
            backgroundColor: '#ea4335',
            borderRadius: 4
          }
        ]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { position: 'bottom' }
        },
        scales: {
          y: {
            beginAtZero: true,
            ticks: { callback: v => Math.round(v/1000) + 'k ₽' }
          }
        }
      }
    });
  }

  function drawPieChart() {
    const ctx = document.getElementById('pieChart').getContext('2d');
    const colors = ['#4285f4', '#34a853', '#fbbc04', '#ea4335', '#ff6d01', '#46bdc6', '#7baaf7', '#f06292', '#aed581', '#ffd54f'];
    const topData = DATA.categoryData.slice(0, 8);
    const otherSum = DATA.categoryData.slice(8).reduce((s, c) => s + c.amount, 0);
    
    const labels = topData.map(c => c.category);
    const values = topData.map(c => c.amount);
    if (otherSum > 0) { labels.push('Остальное'); values.push(otherSum); }
    
    new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: labels,
        datasets: [{
          data: values,
          backgroundColor: colors.slice(0, labels.length),
          borderWidth: 2,
          borderColor: '#fff'
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { position: 'bottom', labels: { font: { size: 11 } } }
        }
      }
    });
  }

  function renderBudget() {
    const container = document.getElementById('budgetItems');
    if (!DATA.budgetData || DATA.budgetData.length === 0) {
      container.innerHTML = '<p style="color:var(--text-secondary)">Нет данных о бюджете</p>';
      return;
    }
    
    container.innerHTML = DATA.budgetData.map(b => {
      let barClass = 'safe';
      if (b.percentUsed >= 90) barClass = 'danger';
      else if (b.percentUsed >= 70) barClass = 'warning';
      
      return `<div class="budget-item">
        <div class="name">${b.category}</div>
        <div class="bar-container">
          <div class="bar ${barClass}" style="width:${Math.min(100, b.percentUsed)}%"></div>
        </div>
        <div class="percent">${b.percentUsed}%</div>
      </div>`;
    }).join('');
  }

  function renderRecommendations() {
    const container = document.getElementById('recommendationsList');
    if (!DATA.recommendations || DATA.recommendations.length === 0) {
      container.innerHTML = '<p style="color:var(--success); font-weight:500;">✅ Отличная работа! Рекомендаций нет.</p>';
      return;
    }
    
    container.innerHTML = DATA.recommendations.map(r => 
      `<div class="recommendation ${r.priority || 'medium'}">${r.message}</div>`
    ).join('');
  }

  function formatMoney(value) {
    if (value === undefined || value === null || isNaN(value)) return '0 ₽';
    const parts = Math.abs(value).toFixed(2).split('.');
    parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
    return (value < 0 ? '-' : '') + parts.join(',') + ' ₽';
  }

  // Запуск
  init();
</script>
</body>
</html>
